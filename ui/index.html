<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JARVIS</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQPDIfaRXPf0+qb+pW1QBCDXI1tINYs="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css?v=17" />
  </head>
  <body>
    <div class="top-cost-meter" aria-label="Koszt i tokeny API">
      <span>API COST</span>
      <strong id="costMeter">$0.000000</strong>
      <small id="tokenMeter">in 0 / out 0</small>
    </div>
    <main class="stage">
      <section class="cockpit left-panel" aria-label="Status">
        <div class="panel-block">
          <h2>STATE</h2>
          <p id="statusPanel">IDLE</p>
        </div>
        <div class="panel-block">
          <h2>LLM GATE</h2>
          <p id="llmGate">BLOCKED</p>
        </div>
        <div class="panel-block">
          <h2>SYSTEMS</h2>
          <p id="systemsPanel"></p>
        </div>
        <div class="panel-block">
          <h2>WAKE TRANSCRIPT</h2>
          <p id="wakeTranscript"></p>
        </div>
        <div class="panel-block setup-warning" id="setupWarningBlock" hidden>
          <h2>SETUP</h2>
          <p id="setupWarning"></p>
        </div>
        <div class="panel-actions">
          <button id="clearTranscriptButton" type="button" title="Wyczysc transkrypcje">CLEAR LOG</button>
          <button id="historyToggleButton" type="button" title="Przelacz zapis historii">HISTORY ON</button>
        </div>
      </section>

      <section class="core-wrap" aria-label="JARVIS">
        <div class="signal-ring signal-ring-a"></div>
        <div class="signal-ring signal-ring-b"></div>
        <div class="orbit orbit-a"></div>
        <div class="orbit orbit-b"></div>
        <div class="core">
          <span>JARVIS</span>
        </div>
        <div class="pulse"></div>
        <div class="voice-bars" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <section class="result-panel" id="resultPanel" aria-label="Wynik wizualny" hidden>
          <div class="result-map" id="resultMap">
            <div class="leaflet-map" id="leafletMap"></div>
            <div class="scan-line"></div>
            <div class="map-marker" id="mapMarker"></div>
            <span id="mapLabel">NO DATA</span>
          </div>
          <div class="result-card">
            <img class="result-image" id="resultImage" alt="" hidden />
            <h2 id="resultTitle">RESULT</h2>
            <p id="resultSummary">Brak aktywnego wyniku.</p>
            <dl id="resultDetails"></dl>
            <p id="resultSources"></p>
            <p id="resultCost"></p>
          </div>
          <ol class="event-queue" id="eventQueue"></ol>
          <div class="result-history" id="resultHistory" aria-label="Historia wynikow"></div>
        </section>
      </section>

      <section class="hud">
        <div class="status-row">
          <span class="status-dot" id="statusDot"></span>
          <span id="stateLabel">IDLE</span>
        </div>
        <div class="status-strip">
          <span>VOICE</span>
          <span>LOCAL</span>
          <span>LOW LATENCY</span>
        </div>
        <p id="transcript"></p>
        <div class="memory-actions" id="memoryActions" hidden>
          <button id="saveMemoryButton" type="button" title="Zapisz fakt">SAVE MEMORY</button>
          <button id="ignoreMemoryButton" type="button" title="Odrzuc fakt">IGNORE</button>
        </div>
        <div class="controls">
          <button id="micButton" type="button" title="Start nagrywania">REC</button>
          <button id="endRecordButton" type="button" title="Zakoncz nagrywanie">END REC</button>
          <button id="stopButton" type="button" title="Stop">STOP</button>
        </div>
        <form id="textForm">
          <div class="command-palette" id="commandPalette" aria-label="Command palette">
            <button type="button" data-command="jaka jest pogoda w Berlinie">WEATHER</button>
            <button type="button" data-command="pokaz status">STATUS</button>
            <button type="button" data-command="dodaj zadanie ">TASK</button>
          </div>
          <input id="textInput" type="text" autocomplete="off" placeholder="Polecenie..." />
        </form>
      </section>

      <section class="cockpit right-panel" aria-label="Context">
        <div class="panel-block">
          <h2>TASKS</h2>
          <ul id="taskPanel"></ul>
        </div>
        <div class="panel-block">
          <h2>PROJECT</h2>
          <p id="projectPanel"></p>
        </div>
        <div class="panel-block">
          <h2>BRIEFING</h2>
          <p id="briefingPanel"></p>
        </div>
        <div class="panel-block">
          <h2>MEMORY</h2>
          <p id="memoryPanel"></p>
        </div>
      </section>
    </main>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js?v=17"></script>
  </body>
</html>
